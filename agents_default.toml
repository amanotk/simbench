version = 1

[agents.opencode]
mode = "docker"
enabled_by_default = true
model = "openai/gpt-5.3-codex"
pass_env = [
  "OPENAI_API_KEY",
  "ANTHROPIC_API_KEY",
]
pre = [
  "mkdir -p \"$HOME/.local/share/opencode\"",
  "if [ -f /opencode-auth.json ]; then cp /opencode-auth.json \"$HOME/.local/share/opencode/auth.json\"; fi",
  "if [ -f /opencode-config.json ]; then export OPENCODE_CONFIG=/opencode-config.json; elif [ -f /opencode-config.jsonc ]; then export OPENCODE_CONFIG=/opencode-config.jsonc; fi",
]
cmd = "opencode run -m \"$BENCH_MODEL\" $BENCH_MODEL_OPTIONS_ARGS --dir \"$BENCH_WORKDIR\" \"$(cat \"$BENCH_PROMPT_FILE\")\" -f \"$BENCH_SPEC_FILE\""

[agents.opencode.env]
OPENCODE_DISABLE_AUTOUPDATE = "1"

[[agents.opencode.mounts]]
host = "~/.local/share/opencode/auth.json"
container = "/opencode-auth.json"
mode = "ro"
optional = true

[[agents.opencode.mounts]]
host = "~/.config/opencode/opencode.json"
container = "/opencode-config.json"
mode = "ro"
optional = true

[[agents.opencode.mounts]]
host = "~/.config/opencode/opencode.jsonc"
container = "/opencode-config.jsonc"
mode = "ro"
optional = true

[agents.claude]
mode = "docker"
enabled_by_default = false
model = "claude-sonnet-4-6"
pass_env = ["ANTHROPIC_API_KEY"]
pre = [
  "mkdir -p \"$HOME/.claude\"",
  "if [ -f /claude-settings.json ]; then cp /claude-settings.json \"$HOME/.claude/settings.json\"; fi",
]
cmd = "claude -p --permission-mode bypassPermissions --tools default --add-dir \"$BENCH_WORKDIR\" --add-dir \"$BENCH_RUN_DIR\" --model \"${BENCH_MODEL##*/}\" $BENCH_MODEL_OPTIONS_ARGS \"$(cat \"$BENCH_PROMPT_FILE\")\""

[[agents.claude.mounts]]
host = "~/.claude/settings.json"
container = "/claude-settings.json"
mode = "ro"
optional = true

[agents.codex]
mode = "docker"
enabled_by_default = false
model = "gpt-5.3-codex"
pass_env = ["OPENAI_API_KEY"]
pre = [
  "mkdir -p \"$HOME/.codex\"",
  "if [ -f /codex-auth.json ]; then cp /codex-auth.json \"$HOME/.codex/auth.json\"; fi",
]
cmd = "codex exec --ephemeral --full-auto --skip-git-repo-check -C \"$BENCH_WORKDIR\" -m \"${BENCH_MODEL##*/}\" $BENCH_MODEL_OPTIONS_ARGS \"$(cat \"$BENCH_PROMPT_FILE\")\""

[[agents.codex.mounts]]
host = "~/.codex/auth.json"
container = "/codex-auth.json"
mode = "ro"
optional = true

[agents.copilot]
mode = "docker"
enabled_by_default = false
model = "gpt-5.3-codex"
pass_env = ["COPILOT_GITHUB_TOKEN", "GH_TOKEN", "GITHUB_TOKEN"]
pre = [
  "mkdir -p \"$HOME/.copilot\"",
  "if [ -f /copilot-config.json ]; then cp /copilot-config.json \"$HOME/.copilot/config.json\"; fi",
]
cmd = "copilot --no-ask-user --allow-all-tools --allow-all-paths --model \"${BENCH_MODEL##*/}\" $BENCH_MODEL_OPTIONS_ARGS -p \"$(cat \"$BENCH_PROMPT_FILE\")\""

[[agents.copilot.mounts]]
host = "~/.copilot/config.json"
container = "/copilot-config.json"
mode = "ro"
optional = true
